<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FareFirst Flights</title>
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /*
       * KEY FIX FOR BLANK SPACE:
       * The widget iframe is always mounted by ChatGPT (because _meta.ui is on
       * the tool definition — required by the SDK). To prevent a blank white
       * block appearing on text-only responses, we:
       *   1. Start with html/body height: 0 and overflow: hidden
       *   2. Only expand to full height when real flight data arrives
       * This makes the iframe invisible/zero-height for all non-flight responses.
       */
      html,
      body {
        height: 0;
        overflow: hidden;
        background: transparent;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        color: white;
      }

      /* Expanded state — set by JS when flights arrive */
      html.has-flights,
      html.has-flights body {
        height: auto;
        overflow: visible;
      }

      body.has-flights {
        padding: 16px;
        min-height: 200px;
      }

      /* Carousel */
      .carousel-container {
        position: relative;
        width: 100%;
        overflow: hidden;
      }
      .carousel-track {
        display: flex;
        gap: 16px;
        transition: transform 0.35s ease;
      }

      .carousel-btn {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: #374151;
        border: none;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        font-size: 18px;
        color: white;
        z-index: 10;
      }
      .carousel-btn:hover {
        background: #4b5563;
      }
      .carousel-prev {
        left: -8px;
      }
      .carousel-next {
        right: -8px;
      }

      /* Flight card */
      .flight-card {
        background: #1f2937;
        border-radius: 18px;
        width: 300px;
        min-width: 300px;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .badge {
        font-size: 12px;
        color: #60a5fa;
        font-weight: 600;
      }

      .route-row {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
      }
      .route {
        font-size: 16px;
        font-weight: 600;
      }
      .date {
        font-size: 12px;
        color: #9ca3af;
        margin-top: 2px;
      }

      .price {
        text-align: right;
      }
      .price-value {
        font-size: 20px;
        font-weight: 700;
      }
      .price-label {
        font-size: 11px;
        color: #9ca3af;
      }

      .airline-row {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .airline-logo {
        width: 26px;
        height: 26px;
        background: white;
        color: black;
        border-radius: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        font-size: 12px;
        flex-shrink: 0;
      }

      .timeline-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .time {
        font-size: 15px;
        font-weight: 600;
      }
      .airport {
        font-size: 11px;
        color: #9ca3af;
        margin-top: 2px;
      }

      .line {
        flex: 1;
        height: 2px;
        background: #4b5563;
        margin: 0 10px;
        position: relative;
      }
      .duration {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        font-size: 11px;
        color: #9ca3af;
        background: #1f2937;
        padding: 0 4px;
        white-space: nowrap;
      }

      .stop {
        text-align: center;
        font-size: 11px;
        color: #34d399;
        margin-top: 6px;
      }

      .book-button {
        margin-top: 6px;
        background: #2563eb;
        padding: 12px;
        border-radius: 28px;
        text-align: center;
        font-weight: 600;
        text-decoration: none;
        color: white;
        font-size: 14px;
        display: block;
        transition: background 0.15s;
      }
      .book-button:hover {
        background: #1d4ed8;
      }

      #root {
        display: none;
      }
      #root.visible {
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      const root = document.getElementById("root");

      // ── RPC bridge ──────────────────────────────────────────────────────────
      let rpcId = 0;
      const pending = new Map();

      const notify = (method, params) =>
        window.parent.postMessage({ jsonrpc: "2.0", method, params }, "*");

      const request = (method, params) =>
        new Promise((resolve, reject) => {
          const id = ++rpcId;
          pending.set(id, { resolve, reject });
          window.parent.postMessage(
            { jsonrpc: "2.0", id, method, params },
            "*",
          );
        });

      window.addEventListener("message", (e) => {
        if (e.source !== window.parent) return;
        const msg = e.data;
        if (!msg || msg.jsonrpc !== "2.0") return;

        if (typeof msg.id === "number") {
          const p = pending.get(msg.id);
          if (!p) return;
          pending.delete(msg.id);
          msg.error ? p.reject(msg.error) : p.resolve(msg.result);
          return;
        }

        if (msg.method === "ui/notifications/tool-result") {
          handleToolResult(msg.params);
        }
      });

      async function init() {
        try {
          await request("ui/initialize", {
            appInfo: { name: "farefirst-widget", version: "1.0.0" },
            appCapabilities: {},
            protocolVersion: "2026-01-26",
          });
          notify("ui/notifications/initialized", {});
        } catch (e) {
          console.error("[widget] bridge init error:", e);
        }
      }

      init();

      // ── CORE GUARD ──────────────────────────────────────────────────────────
      // ChatGPT sends tool-result for EVERY tool call — including plain-text
      // responses (ambiguity, validation, errors). We must check for real flights.
      //
      // html/body starts at height:0 so the iframe takes no space.
      // Only when we confirm flights > 0 do we expand and render.
      // ───────────────────────────────────────────────────────────────────────
      function handleToolResult(params) {
        const sc = params?.structuredContent;
        const flights = sc?.flights;

        // ✅ Only render if flights exist AND sessionToken exists (i.e., API call succeeded)
        if (
          !Array.isArray(flights) ||
          flights.length === 0 ||
          !sc?.sessionToken
        ) {
          console.log("[widget] No flights yet — staying hidden");
          return;
        }

        document.documentElement.classList.add("has-flights");
        document.body.classList.add("has-flights");
        root.classList.add("visible");

        renderFlights(flights, sc.searchParams);
      }

      // ── Formatters ──────────────────────────────────────────────────────────
      function formatPrice(amount, currency) {
        if (amount == null) return "N/A";
        try {
          return new Intl.NumberFormat("en", {
            style: "currency",
            currency: currency || "USD",
            maximumFractionDigits: 0,
          }).format(amount);
        } catch {
          return String(amount);
        }
      }

      function formatTime(t) {
        if (!t) return "N/A";
        const [h, m] = t.split(":");
        const hour = parseInt(h);
        return `${hour % 12 || 12}:${m} ${hour >= 12 ? "PM" : "AM"}`;
      }

      function formatDate(d) {
        if (!d) return "";
        return new Date(d + "T00:00:00").toLocaleDateString("en-US", {
          month: "short",
          day: "numeric",
        });
      }

      // ── Card renderer ───────────────────────────────────────────────────────
      function renderCard(f, sp) {
        const currency = f.price?.currency || sp?.currency || "USD";
        const priceAmt = f.price?.amount ?? f.priceRaw;
        const price = formatPrice(priceAmt, currency);
        const dep = formatTime(f.departureTime);
        const arr = formatTime(f.arrivalTime);
        const date = formatDate(f.date || sp?.date);
        const initial = (f.airline || "F")[0].toUpperCase();
        const stops = f.stopCount ?? f.stops ?? 0;
        const stopText =
          stops === 0 ? "Direct" : `${stops} Stop${stops > 1 ? "s" : ""}`;
        const duration = f.durationFormatted || f.duration || "";
        const bookUrl = f.bookingLink || f.deeplink?.[0] || "#";
        const from = f.from || f.departureAirport || sp?.fromIata || "";
        const to = f.to || f.arrivalAirport || sp?.toIata || "";

        return `
          <div class="flight-card">
            <div class="badge">FareFirst</div>
            <div class="route-row">
              <div>
                <div class="route">${from} → ${to}</div>
                <div class="date">${date} • One way</div>
              </div>
              <div class="price">
                <div class="price-value">${price}</div>
                <div class="price-label">Per person</div>
              </div>
            </div>
            <div class="airline-row">
              <div class="airline-logo">${initial}</div>
              <span>${f.airline || "Airline"}</span>
            </div>
            <div>
              <div class="timeline-row">
                <div>
                  <div class="time">${dep}</div>
                  <div class="airport">${from}</div>
                </div>
                <div class="line"><div class="duration">${duration}</div></div>
                <div>
                  <div class="time">${arr}</div>
                  <div class="airport">${to}</div>
                </div>
              </div>
              <div class="stop">${stopText}</div>
            </div>
            <a href="${bookUrl}" target="_blank" class="book-button">Book on FareFirst</a>
          </div>`;
      }

      // ── Carousel ────────────────────────────────────────────────────────────
      let idx = 0,
        total = 0;

      function renderFlights(flights, sp) {
        total = flights.length;
        idx = 0;

        root.innerHTML = `
          <div class="carousel-container">
            <button class="carousel-btn carousel-prev" onclick="prev()">‹</button>
            <div class="carousel-track" id="track">
              ${flights.map((f) => renderCard(f, sp)).join("")}
            </div>
            <button class="carousel-btn carousel-next" onclick="next()">›</button>
          </div>`;
      }

      window.next = () => {
        if (idx < total - 1) {
          idx++;
          slide();
        }
      };
      window.prev = () => {
        if (idx > 0) {
          idx--;
          slide();
        }
      };

      function slide() {
        const t = document.getElementById("track");
        if (t) t.style.transform = `translateX(-${idx * 316}px)`;
      }
    </script>
  </body>
</html>
